[base]
image=docker.io/library/archlinux:latest
pull=false
init=true
nvidia=false
root=false
entry=true
start_now=false
replace=false

unshare_netns=true
unshare_process=false
unshare_ipc=false
unshare_devsys=false
unshare_groups=false
unshare_all=false

volume="/var/run/docker.sock:/var/run/docker.sock /tmp/whisper:/tmp/whisper"
additional_flags=""
additional_packages="pass"
init_hooks=""
pre_init_hooks=""
exported_apps=""
exported_bins=""
exported_bins_path="~/.local/bin"

[digi3]
include=base
home=/home/stsiapan/homes/digi3

[stellium]
include=base
home=/home/stsiapan/homes/stellium

[voice-test]
include=base
home=/home/stsiapan/homes/voice-test

[personal]
include=base
home=/home/stsiapan/homes/personal
additional_flags="--add-host=host-gateway:192.168.0.153"
