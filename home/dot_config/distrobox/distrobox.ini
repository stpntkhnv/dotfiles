# NOTE: distrobox-assemble treats every [section] as a container, including [base].
# When creating containers from this manifest, always pass --name <containername>,
# otherwise a redundant "base" container will be created alongside the real ones.
#
#   distrobox assemble create --name digi3 --file ~/.config/distrobox/distrobox.ini
#
[base]
image=docker.io/library/archlinux:latest
pull=false
init=true
nvidia=false
root=false
entry=true
start_now=false
replace=false

unshare_netns=true
unshare_process=false
unshare_ipc=false
unshare_devsys=false
unshare_groups=false
unshare_all=false

additional_packages="pass"
# Workaround for util-linux 2.42 --pty regression (breaks distrobox enter on
# init=true containers). The fetched script downgrades util-linux to 2.41.3-2
# and pins it via IgnorePkg. Remove this init_hook once util-linux 2.42.1+
# lands in the Arch repos.
# NOTE: no single quotes / `bash -c` wrapper here. distrobox single-quote-wraps
# init_hooks when it evals the create command; inner quotes close that wrapper
# early and expose the `| bash`, piping podman's container-ID output into bash
# ("<hash>: command not found", create fails). Keep it a bare `curl ... | bash`.
init_hooks="curl -fsSL https://raw.githubusercontent.com/stpntkhnv/dotfiles/main/home/bin/util-linux-fix.sh | bash"
pre_init_hooks=""
exported_apps=""
exported_bins=""
exported_bins_path="~/.local/bin"

[digi3]
include=base
home=/home/stsiapan/homes/digi3

[stellium]
include=base
home=/home/stsiapan/homes/stellium

[voice-test]
include=base
home=/home/stsiapan/homes/voice-test

[personal]
include=base
home=/home/stsiapan/homes/personal
